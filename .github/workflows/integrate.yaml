name: CI
on:
  pull_request:
    branches: ['main', 'release']

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
      - run: npm ci
      - run: npm run build && npm install
      - run: npm run lint
      - run: npm test
